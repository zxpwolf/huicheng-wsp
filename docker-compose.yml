version: '3.8'

services:
  # MySQL 数据库服务
  mysql:
    image: docker.1panel.live/library/mysql:8.0
    container_name: huicheng-wsp-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123456}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-huicheng_wsp}
      MYSQL_USER: ${MYSQL_USER:-wsp_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-wsp123456}
      TZ: Asia/Shanghai
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql
      - ./data/mysql-backup:/backup
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --max-connections=200
      - --innodb-buffer-pool-size=256M
    networks:
      - wsp-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root123456}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Flask 应用服务
  web:
    build: .
    container_name: huicheng-wsp-web
    restart: always
    environment:
      # 数据库配置
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: ${MYSQL_USER:-wsp_user}
      DB_PASSWORD: ${MYSQL_PASSWORD:-wsp123456}
      DB_NAME: ${MYSQL_DATABASE:-huicheng_wsp}
      # Flask配置
      FLASK_APP: app.py
      FLASK_ENV: production
      SECRET_KEY: ${SECRET_KEY:-change-this-secret-key-in-production}
      # 时区
      TZ: Asia/Shanghai
    ports:
      - "${WEB_PORT:-5000}:5000"
    volumes:
      - ./logs:/app/logs
      - ./data/uploads:/app/data/uploads
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - wsp-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/dashboard')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Nginx 反向代理（可选，用于生产环境）
  nginx:
    image: nginx:alpine
    container_name: huicheng-wsp-nginx
    restart: always
    ports:
      - "${NGINX_PORT:-80}:80"
      - "${NGINX_SSL_PORT:-443}:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - web
    networks:
      - wsp-network
    profiles:
      - production  # 使用 docker-compose --profile production up 启用

volumes:
  mysql_data:
    driver: local

networks:
  wsp-network:
    driver: bridge
